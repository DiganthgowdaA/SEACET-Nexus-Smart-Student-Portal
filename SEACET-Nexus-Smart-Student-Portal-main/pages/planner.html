    <main>
        <section class="page-hero"><h1 class="reveal"><span>Academic Planner</span></h1><p class="reveal">Manage your assignments, exams, labs, and projects with countdown timers</p></section>
        <section class="section" style="padding-top:0"><div class="container">
            <!-- Actions -->
            <div class="flex-between flex-wrap gap-4 reveal" style="margin-bottom:var(--space-6)">
                <button class="btn btn-primary" onclick="document.getElementById('taskModal').classList.add('active');document.getElementById('taskModalTitle').textContent='Add Task';">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Task
                </button>
                <div class="filter-row" style="margin-bottom:0">
                    <button class="filter-btn active" data-task-filter="all">All</button>
                    <button class="filter-btn" data-task-filter="Assignment">Assignment</button>
                    <button class="filter-btn" data-task-filter="Exam">Exam</button>
                    <button class="filter-btn" data-task-filter="Lab">Lab</button>
                    <button class="filter-btn" data-task-filter="Project">Project</button>
                    <button class="filter-btn" data-task-filter="Deadline">Deadline</button>
                </div>
            </div>
            <div class="filter-row reveal" style="margin-bottom:var(--space-6)">
                <button class="filter-btn active" data-task-status="all">All Status</button>
                <button class="filter-btn" data-task-status="active">Active</button>
                <button class="filter-btn" data-task-status="completed">Completed</button>
                <button class="filter-btn" data-task-status="overdue">Overdue</button>
            </div>
            <!-- Stats -->
            <div class="stats-strip reveal">
                <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total Tasks</div></div>
                <div class="stat-card"><div class="stat-number" style="color:var(--success)" id="statCompleted">0</div><div class="stat-label">Completed</div></div>
                <div class="stat-card"><div class="stat-number" style="color:var(--primary)" id="statActive">0</div><div class="stat-label">Active</div></div>
                <div class="stat-card"><div class="stat-number" style="color:var(--error)" id="statOverdue">0</div><div class="stat-label">Overdue</div></div>
            </div>
            <!-- Task List -->
            <div id="taskList" class="reveal"></div>
        </div></section>
    </main>

    <!-- Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header"><h2 id="taskModalTitle">Add Task</h2><button class="modal-close" onclick="document.getElementById('taskModal').classList.remove('active')">&times;</button></div>
            <div class="modal-body">
                <form id="taskForm">
                    <div class="form-group"><label for="taskTitle">Title *</label><input type="text" id="taskTitle" required placeholder="e.g. Data Structures Assignment"></div>
                    <div class="form-group"><label for="taskType">Type *</label><select id="taskType" required><option value="Assignment">Assignment</option><option value="Exam">Exam</option><option value="Lab">Lab</option><option value="Project">Project</option><option value="Deadline">Deadline</option></select></div>
                    <div class="form-group"><label for="taskSubject">Subject</label><input type="text" id="taskSubject" placeholder="e.g. Data Structures"></div>
                    <div class="form-group"><label for="taskDesc">Description</label><textarea id="taskDesc" placeholder="Additional details..."></textarea></div>
                    <div class="form-group"><label for="taskDeadline">Deadline *</label><input type="datetime-local" id="taskDeadline" required></div>
                    <div class="modal-footer" style="padding:0;border:none;margin-top:var(--space-4)">
                        <button type="button" class="btn btn-ghost" onclick="document.getElementById('taskModal').classList.remove('active')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 SEACET Nexus</p><p>Built with ❤️</p></div></div></footer>
    <button class="back-to-top" id="backToTop" aria-label="Back to top"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg></button>
    <div class="toast-container" id="toastContainer"></div>
    <script src="../js/storage.js"></script><script src="../js/theme.js"></script><script src="../js/notifications.js"></script><script src="../js/robo.js"></script><script src="../js/demo.js"></script><script src="../js/spatial.js"></script><script src="../js/animations.js"></script><script src="../js/planner.js"></script><script src="../js/app.js"></script>
</body>
</html>
