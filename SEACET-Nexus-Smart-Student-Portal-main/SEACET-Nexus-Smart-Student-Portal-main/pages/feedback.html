<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEACET Nexus Feedback</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#eef4ff,#dce8ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.feedback-container{
    width:450px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.feedback-container h2{
    color:#2563eb;
    text-align:center;
    margin-bottom:10px;
}

.feedback-container p{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input, select, textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#2563eb;
}

.rating{
    display:flex;
    gap:10px;
    font-size:28px;
}

.rating input{
    width:auto;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="feedback-container">

    <h2>SEACET Nexus Feedback</h2>
    <p>Help us improve your campus experience.</p>

    <form id="feedbackForm">

        <div class="input-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Feedback Category</label>
            <select id="category">
                <option value="">Select Category</option>
                <option>Dashboard</option>
                <option>Placements</option>
                <option>Events</option>
                <option>Notes</option>
                <option>Clubs</option>
                <option>Faculty</option>
                <option>Planner</option>
            </select>
        </div>

        <div class="input-group">
            <label>Rate Your Experience</label>
            <div class="rating">
                <label><input type="radio" name="rating" value="1">⭐</label>
                <label><input type="radio" name="rating" value="2">⭐</label>
                <label><input type="radio" name="rating" value="3">⭐</label>
                <label><input type="radio" name="rating" value="4">⭐</label>
                <label><input type="radio" name="rating" value="5">⭐</label>
            </div>
        </div>

        <div class="input-group">
            <label>Your Feedback</label>
            <textarea id="feedback" rows="5"
            placeholder="Write your suggestions here..."></textarea>
        </div>

        <button type="submit">Submit Feedback</button>

    </form>

    <div id="message"></div>

</div>

<script>
document.getElementById("feedbackForm").addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let category = document.getElementById("category").value;
    let feedback = document.getElementById("feedback").value.trim();
    let rating = document.querySelector('input[name="rating"]:checked');

    if(name === "" || email === "" || category === "" || feedback === "" || !rating){
        alert("Please fill all fields and select a rating.");
        return;
    }

    document.getElementById("message").innerHTML =
        "✅ Thank you for your feedback!";

    document.getElementById("feedbackForm").reset();
});
</script>

</body>
</html>
