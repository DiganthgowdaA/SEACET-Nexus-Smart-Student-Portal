<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker — SEACET Nexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/animations.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="loader" class="loader-overlay" role="status" aria-live="polite"></div>
    <div class="blob-container" aria-hidden="true"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
    <nav id="navbar" class="navbar glass"><div class="nav-container"><a href="../index.html" class="nav-logo"><svg width="36" height="36" viewBox="0 0 36 36"><rect width="36" height="36" rx="10" fill="url(#lg)"/><text x="18" y="23" text-anchor="middle" fill="white" font-size="14" font-weight="800" font-family="Inter">SN</text><defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36"><stop offset="0%" stop-color="#1a73e8"/><stop offset="100%" stop-color="#4285f4"/></linearGradient></defs></svg><span class="logo-text">SEACET <span class="logo-accent">Nexus</span></span></a><div class="nav-links" id="navLinks"><a href="../index.html" class="nav-link">Home</a><a href="dashboard.html" class="nav-link">Dashboard</a><a href="placements.html" class="nav-link">Placements</a><a href="events.html" class="nav-link">Events</a><a href="notes.html" class="nav-link">Notes</a><a href="clubs.html" class="nav-link">Clubs</a><a href="faculty.html" class="nav-link">Faculty</a><a href="planner.html" class="nav-link">Planner</a></div><div class="nav-actions"><button class="nav-icon-btn" id="themeToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sun"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-moon" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div></div></nav>
    <main>
        <section class="page-hero"><h1 class="reveal"><span>Internship Tracker</span></h1><p class="reveal">Track your internship applications, interviews, and offers in one place</p></section>
        <section class="section" style="padding-top:0"><div class="container">
            <div class="flex-between flex-wrap gap-4 reveal" style="margin-bottom:var(--space-6)">
                <button class="btn btn-primary" onclick="openInternModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Internship</button>
                <div class="filter-row" style="margin-bottom:0" id="internFilters">
                    <button class="filter-btn active" data-status="all">All</button>
                    <button class="filter-btn" data-status="Applied">Applied</button>
                    <button class="filter-btn" data-status="Interview">Interview</button>
                    <button class="filter-btn" data-status="Offer">Offer</button>
                    <button class="filter-btn" data-status="Rejected">Rejected</button>
                    <button class="filter-btn" data-status="Wishlist">Wishlist</button>
                </div>
            </div>
            <div class="stats-strip reveal">
                <div class="stat-card"><div class="stat-number" id="iTotal">0</div><div class="stat-label">Total</div></div>
                <div class="stat-card"><div class="stat-number" style="color:var(--primary)" id="iApplied">0</div><div class="stat-label">Applied</div></div>
                <div class="stat-card"><div class="stat-number" style="color:#b45309" id="iInterview">0</div><div class="stat-label">Interview</div></div>
                <div class="stat-card"><div class="stat-number" style="color:var(--success)" id="iOffer">0</div><div class="stat-label">Offers</div></div>
            </div>
            <div id="internList" class="reveal"></div>
        </div></section>
    </main>
    <!-- Modal -->
    <div class="modal-overlay" id="internModal">
        <div class="modal"><div class="modal-header"><h2 id="internModalTitle">Add Internship</h2><button class="modal-close" onclick="closeInternModal()">&times;</button></div>
        <div class="modal-body"><form id="internForm">
            <div class="form-group"><label for="iCompany">Company *</label><input type="text" id="iCompany" required placeholder="e.g. Google"></div>
            <div class="form-group"><label for="iRole">Role *</label><input type="text" id="iRole" required placeholder="e.g. SWE Intern"></div>
            <div class="form-group"><label for="iStatus">Status</label><select id="iStatus"><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Wishlist</option></select></div>
            <div class="form-group"><label for="iDate">Applied Date</label><input type="date" id="iDate"></div>
            <div class="form-group"><label for="iNotes">Notes</label><textarea id="iNotes" placeholder="Additional notes..."></textarea></div>
            <div style="display:flex;gap:var(--space-3);justify-content:flex-end;margin-top:var(--space-4)"><button type="button" class="btn btn-ghost" onclick="closeInternModal()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
        </form></div></div>
    </div>
    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 SEACET Nexus</p><p>Built with ❤️</p></div></div></footer>
    <button class="back-to-top" id="backToTop" aria-label="Back to top"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg></button>
    <div class="toast-container" id="toastContainer"></div>
    <script src="../js/storage.js"></script><script src="../js/theme.js"></script><script src="../js/notifications.js"></script><script src="../js/robo.js"></script><script src="../js/demo.js"></script><script src="../js/spatial.js"></script><script src="../js/animations.js"></script><script src="../js/app.js"></script>
    <script>
    const IKEY='seacet_internships';let editId=null;let curFilter='all';
    const getInterns=()=>JSON.parse(localStorage.getItem(IKEY)||'[]');
    const saveInterns=(d)=>localStorage.setItem(IKEY,JSON.stringify(d));
    const statusColors={Applied:'#1a73e8',Interview:'#b45309',Offer:'#34a853',Rejected:'#ea4335',Wishlist:'#8b5cf6'};
    const statusProgress={Applied:25,Interview:50,Offer:100,Rejected:0,Wishlist:10};
    function openInternModal(){editId=null;document.getElementById('internForm').reset();document.getElementById('internModalTitle').textContent='Add Internship';document.getElementById('internModal').classList.add('active');}
    function closeInternModal(){document.getElementById('internModal').classList.remove('active');}
    function render(){
        const list=document.getElementById('internList');let interns=getInterns();
        if(curFilter!=='all')interns=interns.filter(i=>i.status===curFilter);
        const all=getInterns();
        document.getElementById('iTotal').textContent=all.length;
        document.getElementById('iApplied').textContent=all.filter(i=>i.status==='Applied').length;
        document.getElementById('iInterview').textContent=all.filter(i=>i.status==='Interview').length;
        document.getElementById('iOffer').textContent=all.filter(i=>i.status==='Offer').length;
        if(!interns.length){list.innerHTML='<div class="empty-state" style="padding:48px;text-align:center"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg><h3 style="margin-top:16px">No internships tracked yet</h3><p>Click "Add Internship" to start tracking!</p></div>';return;}
        list.innerHTML=interns.map(i=>{const c=statusColors[i.status]||'#1a73e8';const p=statusProgress[i.status]||0;return`
        <div class="internship-card" style="margin-bottom:var(--space-4)"><div class="intern-header"><div><h3 class="intern-company">${i.company}</h3><p class="intern-role">${i.role}</p></div><span class="badge" style="background:${c}15;color:${c}">${i.status}</span></div>
        <div class="intern-progress"><div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${c}"></div></div></div>
        ${i.date?`<p class="intern-date">📅 Applied: ${new Date(i.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</p>`:''}
        ${i.notes?`<p class="intern-notes">${i.notes}</p>`:''}
        <div class="intern-actions"><button class="btn btn-sm btn-ghost" onclick="editIntern('${i.id}')">✏️ Edit</button><button class="btn btn-sm btn-ghost" style="color:var(--error)" onclick="deleteIntern('${i.id}')">🗑️ Delete</button></div></div>`;}).join('');
    }
    function editIntern(id){const i=getInterns().find(x=>x.id===id);if(!i)return;editId=id;document.getElementById('iCompany').value=i.company;document.getElementById('iRole').value=i.role;document.getElementById('iStatus').value=i.status;document.getElementById('iDate').value=i.date||'';document.getElementById('iNotes').value=i.notes||'';document.getElementById('internModalTitle').textContent='Edit Internship';document.getElementById('internModal').classList.add('active');}
    function deleteIntern(id){if(!confirm('Delete this internship?'))return;const d=getInterns().filter(x=>x.id!==id);saveInterns(d);render();NotificationManager.showToast('Internship deleted','error');}
    document.getElementById('internForm').addEventListener('submit',(e)=>{e.preventDefault();const d=getInterns();const obj={company:document.getElementById('iCompany').value.trim(),role:document.getElementById('iRole').value.trim(),status:document.getElementById('iStatus').value,date:document.getElementById('iDate').value,notes:document.getElementById('iNotes').value.trim()};
    if(editId){const idx=d.findIndex(x=>x.id===editId);if(idx>=0){d[idx]={...d[idx],...obj};saveInterns(d);NotificationManager.showToast('Updated!','success');}}else{obj.id=Date.now().toString();d.push(obj);saveInterns(d);NotificationManager.showToast('Internship added!','success');}
    closeInternModal();document.getElementById('internForm').reset();editId=null;render();});
    document.querySelectorAll('#internFilters .filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#internFilters .filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=b.dataset.status;render();});});
    document.addEventListener('DOMContentLoaded',render);
    </script>
</body>
</html>
